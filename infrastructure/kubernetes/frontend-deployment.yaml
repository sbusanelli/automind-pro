# AutoMind Frontend Kubernetes Deployment for GitLab

apiVersion: apps/v1
kind: Deployment
metadata:
  name: automind-frontend
  namespace: automind-staging
  labels:
    app: automind-frontend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: automind-frontend
  template:
    metadata:
      labels:
        app: automind-frontend
        version: v1
    spec:
      containers:
      - name: frontend
        image: registry.gitlab.com/sbusanelli/automind/automind-frontend:latest
        ports:
        - containerPort: 80
        env:
        - name: NODE_ENV
          value: "production"
        - name: API_URL
          value: "https://api.automind.ai"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: automind-frontend-service
  namespace: automind-staging
  labels:
    app: automind-frontend
spec:
  selector:
    app: automind-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: automind-frontend-ingress
  namespace: automind-staging
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - staging.automind.ai
    secretName: automind-frontend-tls
  rules:
  - host: staging.automind.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: automind-frontend-service
            port:
              number: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: automind-frontend-hpa
  namespace: automind-staging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: automind-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
